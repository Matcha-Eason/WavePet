<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WavePet Demo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f2;
        --ink: #172026;
        --muted: #607078;
        --panel: #ffffff;
        --line: #dfe5df;
        --accent: #2f6f73;
        --tint: rgba(47, 111, 115, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: grid;
        grid-template-columns: minmax(280px, 420px) minmax(360px, 1fr);
      }

      main {
        padding: 28px;
        display: grid;
        place-items: center;
        border-right: 1px solid var(--line);
      }

      aside {
        padding: 28px;
        display: grid;
        align-content: start;
        gap: 18px;
      }

      .stage {
        width: min(76vw, 360px);
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        position: relative;
      }

      .pet {
        width: 220px;
        aspect-ratio: 1;
        border-radius: 42px;
        background: #2f6f73;
        display: grid;
        place-items: center;
        box-shadow: 0 22px 50px rgba(29, 46, 50, 0.18);
        transform: scale(var(--scale, 1));
        transition: transform 180ms ease, filter 180ms ease;
        position: relative;
        overflow: hidden;
      }

      .pet::before {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--tint);
        mix-blend-mode: screen;
      }

      .face {
        width: 132px;
        height: 116px;
        border-radius: 48% 48% 42% 42%;
        background: #f7f4ea;
        position: relative;
      }

      .face::before,
      .face::after {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        top: 43px;
        border-radius: 50%;
        background: #1f2933;
      }

      .face::before {
        left: 34px;
      }

      .face::after {
        right: 34px;
      }

      .mouth {
        position: absolute;
        left: 50%;
        bottom: 29px;
        width: 38px;
        height: 18px;
        border-bottom: 6px solid #1f2933;
        border-radius: 0 0 28px 28px;
        transform: translateX(-50%);
      }

      .bubble {
        position: absolute;
        top: 18px;
        right: 6px;
        min-width: 116px;
        max-width: 180px;
        padding: 10px 12px;
        border-radius: 8px;
        background: var(--panel);
        border: 1px solid var(--line);
        box-shadow: 0 8px 24px rgba(18, 32, 37, 0.12);
        font-size: 14px;
      }

      .badge {
        position: absolute;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%);
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--ink);
        color: white;
        font-size: 13px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 22px;
      }

      .muted {
        color: var(--muted);
        font-size: 14px;
      }

      .controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--ink);
        border-radius: 8px;
        padding: 9px 12px;
        cursor: pointer;
      }

      button.primary {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 340px;
        overflow: auto;
        font-size: 12px;
        line-height: 1.45;
      }

      .meter {
        height: 8px;
        border-radius: 999px;
        background: #e8ece7;
        overflow: hidden;
      }

      .meter > span {
        display: block;
        height: 100%;
        width: calc(var(--value, 0) * 100%);
        background: var(--accent);
        transition: width 160ms ease;
      }

      .reading {
        animation: reading var(--cadence, 800ms) ease-in-out infinite;
      }

      .typing {
        animation: typing var(--cadence, 800ms) ease-in-out infinite;
      }

      .intense_typing {
        animation: intense var(--cadence, 500ms) ease-in-out infinite;
      }

      .shake {
        animation: shake var(--cadence, 400ms) linear infinite;
      }

      .settle {
        animation: settle var(--cadence, 800ms) ease-in-out infinite;
      }

      @keyframes reading {
        50% { transform: translateY(-4px) scale(var(--scale, 1)); }
      }

      @keyframes typing {
        25% { transform: translateX(-3px) scale(var(--scale, 1)); }
        75% { transform: translateX(3px) scale(var(--scale, 1)); }
      }

      @keyframes intense {
        50% { transform: translateY(-8px) scale(calc(var(--scale, 1) + 0.025)); }
      }

      @keyframes shake {
        25% { transform: translateX(-7px) scale(var(--scale, 1)); }
        75% { transform: translateX(7px) scale(var(--scale, 1)); }
      }

      @keyframes settle {
        50% { transform: translateY(3px) scale(var(--scale, 1)); }
      }

      @media (max-width: 760px) {
        body {
          grid-template-columns: 1fr;
        }

        main {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="stage">
        <div id="bubble" class="bubble">Waiting for events...</div>
        <div id="pet" class="pet reading">
          <div class="face"><span class="mouth"></span></div>
        </div>
        <div id="badge" class="badge">idle</div>
      </div>
    </main>
    <aside>
      <section>
        <h1>WavePet Demo</h1>
        <div class="muted">Single-image desktop pet compatibility test</div>
      </section>
      <section class="controls">
        <button id="play" class="primary">Play sample</button>
        <button id="step">Step</button>
        <button id="reset">Reset</button>
      </section>
      <section class="card">
        <strong id="state">state: idle</strong>
        <p class="muted" id="reason">No state yet.</p>
        <div class="meter"><span id="meter"></span></div>
      </section>
      <section class="card">
        <strong>Latest JSON</strong>
        <pre id="json">{}</pre>
      </section>
    </aside>
    <script>
      const states = [
        {
          state: "reading_understanding",
          state_zh: "读题理解",
          intensity: 0.22,
          reason: "Early low-pressure turn; likely reading or understanding context.",
          presentation: { motion: "reading", tint: "neutral", scale: 1.01, badge: "读题", bubble: "我先看看...", cadence_ms: 850 }
        },
        {
          state: "deep_output",
          state_zh: "深度输出",
          intensity: 0.76,
          reason: "Current output, thinking, or silence is long enough to feel like deep work.",
          presentation: { motion: "intense_typing", tint: "focus", scale: 1.06, badge: "输出", bubble: "正在认真写...", cadence_ms: 520 }
        },
        {
          state: "overheat_debugging",
          state_zh: "红温调试",
          intensity: 1,
          reason: "Errors, tests, logs, or validation pressure are high.",
          presentation: { motion: "shake", tint: "hot", scale: 1.08, badge: "调试", bubble: "压力上来了", cadence_ms: 420 }
        },
        {
          state: "closing",
          state_zh: "收束",
          intensity: 0.42,
          reason: "Completion or wrap-up signals are stronger than active pressure.",
          presentation: { motion: "settle", tint: "cool", scale: 1.02, badge: "收束", bubble: "快整理好了", cadence_ms: 780 }
        }
      ];

      const tintMap = {
        neutral: "rgba(47, 111, 115, 0.08)",
        focus: "rgba(40, 180, 140, 0.22)",
        warm: "rgba(245, 158, 11, 0.20)",
        hot: "rgba(239, 68, 68, 0.32)",
        cool: "rgba(59, 130, 246, 0.18)"
      };

      let index = -1;
      let timer = null;

      function render(payload) {
        const p = payload.presentation;
        const pet = document.getElementById("pet");
        pet.className = `pet ${p.motion}`;
        pet.style.setProperty("--scale", p.scale);
        pet.style.setProperty("--cadence", `${p.cadence_ms}ms`);
        document.documentElement.style.setProperty("--tint", tintMap[p.tint] || tintMap.neutral);
        document.getElementById("bubble").textContent = p.bubble;
        document.getElementById("badge").textContent = p.badge;
        document.getElementById("state").textContent = `${payload.state_zh} / ${payload.state}`;
        document.getElementById("reason").textContent = payload.reason;
        document.getElementById("meter").style.setProperty("--value", payload.intensity);
        document.getElementById("json").textContent = JSON.stringify(payload, null, 2);
      }

      function step() {
        index = (index + 1) % states.length;
        render(states[index]);
      }

      document.getElementById("step").addEventListener("click", step);
      document.getElementById("reset").addEventListener("click", () => {
        clearInterval(timer);
        timer = null;
        index = -1;
        render(states[0]);
      });
      document.getElementById("play").addEventListener("click", () => {
        clearInterval(timer);
        step();
        timer = setInterval(step, 1300);
      });

      render(states[0]);
    </script>
  </body>
</html>
